<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Ellis Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
  :root {
    --crimson: #650820;
    --crimson-deep: #4a0617;
    --crimson-soft: #8a1a35;
    --white: #ffffff;
    --ivory: #faf6f1;
    --ivory-warm: #f3ebe0;
    --ink: #1a0608;
    --muted: #7a6a6e;
    --line: rgba(101, 8, 32, 0.18);
    --shadow-lg: 0 30px 60px -20px rgba(74, 6, 23, 0.35);

    --serif: "Cormorant SC", "Cormorant Garamond", serif;
    --serif-i: "Cormorant Garamond", serif;
    --script: "Pinyon Script", "Burgues Script", "Allura", cursive;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--serif);
    color: var(--ink);
    background: var(--ivory);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
  a { color: inherit; text-decoration: none; }
  img { display: block; max-width: 100%; }

  /* App shell — mobile first, centered on desktop */
  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    min-height: 100vh;
    position: relative;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  @media (max-width: 520px) {
    .app { box-shadow: none; }
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 40;
    height: 60px;
    background: var(--white);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    backdrop-filter: blur(8px);
  }
  .header.transparent {
    background: linear-gradient(
      180deg,
      rgba(26, 6, 8, 0.55) 0%,
      rgba(26, 6, 8, 0.35) 40%,
      rgba(26, 6, 8, 0.15) 75%,
      rgba(26, 6, 8, 0) 100%
    );
    backdrop-filter: blur(6px);
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
    height: 96px;
    border-bottom-color: transparent;
    position: absolute;
    left: 0; right: 0; top: 0;
    color: var(--white);
    align-items: flex-start;
    padding-top: 14px;
  }
  .header__brand {
    font-family: var(--script);
    font-size: 28px;
    line-height: 1;
    color: var(--crimson);
    letter-spacing: 0.5px;
    padding-top: 4px;
  }
  .header.transparent .header__brand { color: var(--white); }
  .header__menu, .header__back {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background 0.2s;
  }
  .header__menu:hover, .header__back:hover { background: rgba(101, 8, 32, 0.06); }
  .header.transparent .header__menu:hover { background: rgba(255,255,255,0.15); }
  .icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.4; fill: none; }

  /* Nav drawer */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(26, 6, 8, 0.55);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0;
    height: 100vh;
    width: min(82vw, 380px);
    background: var(--crimson);
    color: var(--white);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex;
    flex-direction: column;
    padding: 24px 28px 32px;
  }
  .drawer.open { transform: translateX(0); }
  .drawer__close {
    align-self: flex-end;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: var(--white);
  }
  .drawer__brand {
    font-family: var(--script);
    font-size: 44px;
    line-height: 1;
    margin: 16px 0 6px;
    color: var(--white);
  }
  .drawer__sub {
    font-family: var(--serif);
    letter-spacing: 0.3em;
    font-size: 11px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 28px;
  }
  .drawer__nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .drawer__link {
    font-family: var(--serif);
    font-size: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: padding 0.2s, color 0.2s;
    color: rgba(255,255,255,0.85);
  }
  .drawer__link:hover { padding-left: 6px; color: var(--white); }
  .drawer__link.active { color: var(--white); }
  .drawer__link .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--white);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .drawer__link.active .dot { opacity: 1; }
  .drawer__foot {
    margin-top: 24px;
    font-family: var(--serif-i);
    font-style: italic;
    font-size: 14px;
    opacity: 0.7;
    line-height: 1.6;
  }

  /* Page transitions */
  .page {
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }

  /* Common page chrome */
  .page-head {
    padding: 56px 28px 28px;
    text-align: center;
  }
  .page-head__eyebrow {
    font-family: var(--serif);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--crimson);
    opacity: 0.8;
  }
  .page-head__title {
    font-family: var(--script);
    font-size: 60px;
    line-height: 1;
    color: var(--crimson);
    margin: 10px 0 14px;
    font-weight: 400;
  }
  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    color: var(--crimson);
    opacity: 0.65;
    margin: 6px auto 0;
  }
  .ornament::before, .ornament::after {
    content: ""; width: 36px; height: 1px; background: currentColor;
  }
  .ornament__d {
    width: 5px; height: 5px;
    transform: rotate(45deg);
    background: currentColor;
  }

  /* ---------- HOME ---------- */
  .home {
    position: relative;
    min-height: 100vh;
    color: var(--white);
  }
  .home__bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 18%;
    background-image:
      linear-gradient(180deg,
        rgba(26,6,8,0.05) 0%,
        rgba(26,6,8,0.05) 35%,
        rgba(26,6,8,0.45) 60%,
        rgba(26,6,8,0.85) 85%,
        rgba(26,6,8,0.95) 100%),
      url("images/hero.jpg");
  }
  .home__overlay {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    text-align: center;
    padding: 0 28px 28px;
  }
  .home__pre {
    font-family: var(--serif);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 11px;
    opacity: 0.9;
    margin-bottom: 18px;
  }
  .home__title {
    font-family: var(--script);
    font-size: clamp(56px, 16vw, 92px);
    line-height: 0.9;
    font-weight: 400;
    margin: 0;
    text-shadow: 0 6px 30px rgba(0,0,0,0.45);
    letter-spacing: 0.5px;
  }
  .home__amp {
    display: block;
    font-size: 0.46em;
    margin: -0.06em 0;
    opacity: 0.95;
  }
  .home__meta {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--serif);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-size: 11px;
    white-space: nowrap;
  }
  .home__meta .bar { width: 18px; height: 1px; background: rgba(255,255,255,0.7); }

  /* Countdown */
  .countdown {
    margin-top: 22px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 320px;
  }
  .countdown__cell {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.22);
    backdrop-filter: blur(6px);
    padding: 9px 4px 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .countdown__n {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    color: var(--white);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .countdown__l {
    font-family: var(--serif);
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-top: 2px;
  }

  .home__cta {
    margin-top: 20px;
    font-family: var(--serif);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--white);
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 22px;
    border: 1px solid rgba(255,255,255,0.55);
    transition: background 0.2s, color 0.2s;
  }
  .home__cta:hover { background: var(--white); color: var(--crimson); border-color: var(--white); }
  .home__cta svg { width: 12px; height: 12px; }

  /* ---------- Buttons / shared ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 24px;
    background: var(--crimson);
    color: var(--white);
    font-family: var(--serif);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-size: 12px;
    border-radius: 0;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover { background: var(--crimson-deep); }
  .btn:active { transform: scale(0.98); }
  .btn--ghost {
    background: transparent;
    color: var(--crimson);
    border: 1px solid var(--crimson);
  }
  .btn--ghost:hover { background: var(--crimson); color: var(--white); }

  /* ---------- PLAYLIST ---------- */
  .playlist {
    padding: 0 0 60px;
  }
  .playlist__hero {
    background: var(--crimson);
    color: var(--white);
    padding: 36px 28px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .playlist__hero::after {
    content: "";
    position: absolute;
    inset: -40% -20% auto auto;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
  }
  .playlist__cover {
    width: 200px; height: 200px;
    margin: 8px auto 18px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.06), rgba(0,0,0,0.18)),
      url("https://picsum.photos/seed/ellis-playlist/400/400");
    background-size: cover;
    background-position: center;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
    position: relative;
  }
  .playlist__cover::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(255,255,255,0.35);
  }
  .playlist__title-script {
    font-family: var(--script);
    font-size: 54px;
    line-height: 1;
    color: var(--white);
    margin: 4px 0 2px;
  }
  .playlist__title-serif {
    font-family: var(--serif);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-size: 11px;
    opacity: 0.85;
  }
  .playlist__stats {
    display: flex; gap: 16px; justify-content: center;
    margin-top: 18px;
    font-family: var(--serif-i);
    font-style: italic;
    font-size: 13px;
    opacity: 0.85;
  }
  .playlist__stats .sep { opacity: 0.5; }
  .playlist__play {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    color: var(--crimson);
    padding: 12px 28px 12px 18px;
    font-family: var(--serif);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    font-size: 12px;
    transition: transform 0.15s;
  }
  .playlist__play:hover { transform: scale(1.02); }
  .playlist__play .play-ic {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--crimson);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
  }

  .tracklist {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .track {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    transition: background 0.2s;
    cursor: pointer;
  }
  .track:hover { background: var(--ivory); }
  .track__num {
    font-family: var(--serif-i);
    font-style: italic;
    color: var(--muted);
    font-size: 16px;
    text-align: center;
  }
  .track:hover .track__num { color: var(--crimson); }
  .track__title {
    font-family: var(--serif);
    font-size: 17px;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1.2;
  }
  .track__artist {
    font-family: var(--serif-i);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .track__time {
    font-family: var(--serif-i);
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
  }
  .track.playing .track__num { color: var(--crimson); }
  .track.playing .track__title { color: var(--crimson); }
  .track.playing .pulse {
    display: inline-flex; gap: 2px; align-items: flex-end; height: 14px;
  }
  .pulse span {
    display: inline-block;
    width: 2px; background: var(--crimson);
    animation: pulse 0.9s ease-in-out infinite;
  }
  .pulse span:nth-child(1) { animation-delay: 0s; height: 60%; }
  .pulse span:nth-child(2) { animation-delay: 0.2s; height: 100%; }
  .pulse span:nth-child(3) { animation-delay: 0.4s; height: 70%; }
  @keyframes pulse {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* ---------- TRAVEL ---------- */
  .travel { padding: 0 0 60px; }
  .travel__intro {
    padding: 0 28px 24px;
    text-align: center;
    font-family: var(--serif-i);
    font-style: italic;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }
  .card {
    margin: 0 22px 22px;
    background: var(--white);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .card__img {
    aspect-ratio: 16 / 10;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .card__badge {
    position: absolute;
    top: 14px; left: 14px;
    background: var(--white);
    color: var(--crimson);
    padding: 5px 12px;
    font-family: var(--serif);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-size: 10px;
  }
  .card__body { padding: 20px 22px 22px; }
  .card__title {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--crimson);
    letter-spacing: 0.02em;
    margin: 0 0 4px;
    font-weight: 500;
  }
  .card__sub {
    font-family: var(--serif-i);
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 12px;
  }
  .card__text {
    font-family: var(--serif-i);
    color: var(--ink);
    line-height: 1.65;
    font-size: 15px;
    margin: 0 0 14px;
  }
  .card__meta {
    display: flex; flex-wrap: wrap; gap: 14px;
    font-family: var(--serif);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--crimson);
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .card__meta span { display: inline-flex; align-items: center; gap: 6px; }

  .section-title {
    text-align: center;
    margin: 24px 0 18px;
  }
  .section-title h3 {
    font-family: var(--script);
    font-size: 40px;
    color: var(--crimson);
    margin: 0;
    font-weight: 400;
    line-height: 1;
  }
  .section-title .eyebrow {
    font-family: var(--serif);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ---------- THINGS TO DO (same cards) ---------- */

  /* ---------- PHOTOS ---------- */
  .gallery {
    padding: 0 14px 60px;
    column-count: 2;
    column-gap: 8px;
  }
  .gallery__item {
    break-inside: avoid;
    margin-bottom: 8px;
    background: var(--ivory-warm);
    overflow: hidden;
    cursor: zoom-in;
    position: relative;
    transition: transform 0.25s;
  }
  .gallery__item:hover { transform: translateY(-2px); }
  .gallery__item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.4s;
  }
  .gallery__item:hover img { transform: scale(1.04); }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(26, 6, 8, 0.95);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .lightbox.open { opacity: 1; pointer-events: auto; }
  .lightbox img {
    max-width: 100%;
    max-height: 84vh;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .lightbox__close {
    position: absolute;
    top: 20px; right: 20px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox__nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: var(--white);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lightbox__nav:hover { background: rgba(255,255,255,0.2); }
  .lightbox__nav--prev { left: 16px; }
  .lightbox__nav--next { right: 16px; }
  .lightbox__caption {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-family: var(--serif-i);
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.06em;
  }

  /* ---------- WEDDING PARTY ---------- */
  .party { padding: 0 28px 60px; }
  .party__group { margin-top: 32px; }
  .party__group-title {
    font-family: var(--script);
    font-size: 36px;
    color: var(--crimson);
    text-align: center;
    margin: 0 0 4px;
    font-weight: 400;
    line-height: 1;
  }
  .party__group-eyebrow {
    text-align: center;
    font-family: var(--serif);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .party__list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .party__item {
    padding: 14px 4px;
    border-bottom: 1px dashed var(--line);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
  }
  .party__item:last-child { border-bottom: 0; }
  .party__name {
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .party__role {
    font-family: var(--serif-i);
    font-style: italic;
    color: var(--crimson);
    font-size: 13px;
    letter-spacing: 0.04em;
    text-align: right;
    flex-shrink: 0;
  }

  /* ---------- REGISTRY ---------- */
  .registry {
    padding: 0 32px 60px;
    text-align: center;
  }
  .registry__card {
    background: var(--crimson);
    color: var(--white);
    padding: 40px 28px;
    margin-top: 12px;
    position: relative;
  }
  .registry__card::before, .registry__card::after {
    content: "";
    position: absolute;
    left: 16px; right: 16px;
    height: 1px;
    background: rgba(255,255,255,0.3);
  }
  .registry__card::before { top: 12px; }
  .registry__card::after { bottom: 12px; }
  .registry__script {
    font-family: var(--script);
    font-size: 56px;
    line-height: 1;
    margin: 0 0 8px;
  }

    width: 16px; height: 16px;
    position: relative;
    flex-shrink: 0;
    color: var(--crimson);
  }

    content: "";
    position: absolute;
    background: currentColor;
    transition: transform 0.3s;
  }
  .faq__q .chev::before {
    top: 7px; left: 0; right: 0; height: 1.5px;
  }
  .faq__q .chev::after {
    top: 0; bottom: 0; left: 7px; width: 1.5px;
  }
  .faq__item.open .faq__q .chev::after { transform: scaleY(0); }
  .faq__a {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;

  .faq__a-inner {
    padding: 0 6px 22px;

    font-style: italic;
    color: var(--muted);
    line-height: 1.7;
    font-size: 15px;

    padding: 0 28px 80px;

    position: relative;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .rsvp__envelope::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(180deg, var(--crimson), var(--crimson-deep));
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .rsvp__seal {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);

    align-items: center;

  .rsvp__lead {

  /* ---------- FOOTER ---------- */

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    /* ---------- Routing ---------- */
    const ROUTES = [
      { id: "home",     label: "Home" },

    function useHashRoute() {
      const get = () => {
        const h = (window.location.hash || "#home").replace("#", "");
        return ROUTES.find(r => r.id === h) ? h : "home";
      };
      const [route, setRoute] = useState(get());
      useEffect(() => {
        const onHash = () => { setRoute(get()); window.scrollTo({ top: 0, behavior: "instant" }); };
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);
      return [route, (id) => { window.location.hash = id; }];
    }

    /* ---------- Icons ---------- */
    const Icon = {

      close: () => (
        <svg viewBox="0 0 24 24" className="icon"><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></svg>

      ),
      clock: () => (
        <svg viewBox="0 0 24 24" className="icon" style={{ width: 14, height: 14 }}><circle cx="12" cy="12" r="9" /><polyline points="12 7 12 12 15.5 14" /></svg>
      ),
      ext: () => (
        <svg viewBox="0 0 24 24" className="icon" style={{ width: 12, height: 12 }}><path d="M14 4h6v6" /><line x1="20" y1="4" x2="11" y2="13" /><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5" /></svg>

        <svg viewBox="0 0 24 24" className="icon" style={{ width: 14, height: 14 }}><rect x="3" y="6" width="18" height="13" /><polyline points="3 7 12 14 21 7" /></svg>

    };

    /* ---------- Countdown ---------- */
    function Countdown({ target }) {
      const calc = () => {
        const diff = new Date(target).getTime() - Date.now();
        if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, done: true };
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        return { d, h, m, s, done: false };
      };
      const [t, setT] = useState(calc);
      useEffect(() => {
        const id = setInterval(() => setT(calc()), 1000);
        return () => clearInterval(id);
      }, [target]);
      const pad = (n) => n.toString().padStart(2, "0");
      return (
        <div className="countdown" aria-label="Time until the wedding">
          <div className="countdown__cell"><div className="countdown__n">{t.d}</div><div className="countdown__l">Days</div></div>
          <div className="countdown__cell"><div className="countdown__n">{pad(t.h)}</div><div className="countdown__l">Hrs</div></div>
          <div className="countdown__cell"><div className="countdown__n">{pad(t.m)}</div><div className="countdown__l">Min</div></div>
          <div className="countdown__cell"><div className="countdown__n">{pad(t.s)}</div><div className="countdown__l">Sec</div></div>
        </div>
      );
    }

    /* ---------- Header & Drawer ---------- */

    function Drawer({ open, onClose, route, go }) {

            <div className="drawer__brand">The Ellis Wedding</div>
            <div className="drawer__sub">March 14 · 2027 · Jersey City</div>
            <nav className="drawer__nav">
              {ROUTES.map(r => (
                <a key={r.id}
                   href={"#" + r.id}
                   className={"drawer__link" + (r.id === route ? " active" : "")}
                   onClick={(e) => { e.preventDefault(); go(r.id); onClose(); }}>
                  <span>{r.label}</span>

                </a>
              ))}
            </nav>
            <div className="drawer__foot">
              "To love and to cherish,<br/>from this day forward."

        </>
      );
    }

    /* ---------- Page Head ---------- */
    function PageHead({ eyebrow, title }) {
      return (

    /* ---------- PLAYLIST ---------- */
    const TRACKS = [
      { t: "At Last", a: "Etta James", d: "3:02" },

    function Things() {

    /* ---------- PHOTOS ---------- */
    const PHOTOS = [
      { src: "https://picsum.photos/seed/ellis-p1/600/800",  cap: "The proposal · Folly Beach, May 2024" },

        const onKey = (e) => {
          if (lb === null) return;
          if (e.key === "Escape") setLb(null);
          if (e.key === "ArrowRight") setLb((i) => (i + 1) % PHOTOS.length);
          if (e.key === "ArrowLeft")  setLb((i) => (i - 1 + PHOTOS.length) % PHOTOS.length);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [lb]);

      return (
        <section className="page">
          <PageHead eyebrow="The story so far" title="Photographs" />
          <div className="gallery">
            {PHOTOS.map((p, i) => (
              <div key={i} className="gallery__item" onClick={() => setLb(i)}>
                <img src={p.src} alt={p.cap} loading="lazy" />
              </div>
            ))}
          </div>

          <div className={"lightbox" + (lb !== null ? " open" : "")} onClick={() => setLb(null)}>
            {lb !== null && (
              <>
                <button className="lightbox__close" aria-label="Close" onClick={(e) => { e.stopPropagation(); setLb(null); }}>
                  <Icon.close />
                </button>
                <button className="lightbox__nav lightbox__nav--prev"
                  aria-label="Previous"
                  onClick={(e) => { e.stopPropagation(); setLb((i) => (i - 1 + PHOTOS.length) % PHOTOS.length); }}>
                  <svg viewBox="0 0 24 24" className="icon"><polyline points="15 6 9 12 15 18"/></svg>
                </button>
                <img src={PHOTOS[lb].src} alt={PHOTOS[lb].cap} onClick={(e) => e.stopPropagation()} />
                <button className="lightbox__nav lightbox__nav--next"
                  aria-label="Next"
                  onClick={(e) => { e.stopPropagation(); setLb((i) => (i + 1) % PHOTOS.length); }}>
                  <Icon.arrow />
                </button>
                <div className="lightbox__caption">{PHOTOS[lb].cap} &nbsp;·&nbsp; {lb + 1} / {PHOTOS.length}</div>
              </>
            )}
          </div>
        </section>
      );
    }

    /* ---------- WEDDING PARTY ---------- */
    const PARTY_GROUPS = [
      { script: "Parents", eyebrow: "Of the Bride & Groom", items: [
        { name: "Caroline & David Whitford", role: "Parents of the Bride" },
        { name: "Margaret & Jonathan Ellis", role: "Parents of the Groom" },
        { name: "Eleanor Whitford", role: "Grandmother of the Bride" },
        { name: "Robert Ellis", role: "Grandfather of the Groom" },
      ]},
      { script: "Her Side", eyebrow: "Bridesmaids", items: [
        { name: "Charlotte Whitford", role: "Maid of Honor · Sister" },
        { name: "Ainsley Brennan", role: "Bridesmaid" },
        { name: "Sloane Marchetti", role: "Bridesmaid" },
        { name: "Imogen Pike", role: "Bridesmaid" },
        { name: "Harper Quinn-Ellis", role: "Bridesmaid · Sister of the Groom" },
        { name: "Beatrice Sutton", role: "Bridesmaid" },
        { name: "Olive Caldwell", role: "Flower Girl" },
      ]},
      { script: "His Side", eyebrow: "Groomsmen", items: [
        { name: "Henry Ellis", role: "Best Man · Brother" },
        { name: "Wesley Harrow", role: "Groomsman" },
        { name: "Theodore Vance", role: "Groomsman" },
        { name: "Augustus Pell", role: "Groomsman" },
        { name: "Nathaniel Whitford", role: "Groomsman · Brother of the Bride" },
        { name: "Calvin Reed", role: "Groomsman" },
        { name: "Felix Caldwell", role: "Ring Bearer" },
      ]},
      { script: "Officiating", eyebrow: "With Gratitude", items: [
        { name: "Reverend Samuel Holloway", role: "Officiant" },
      ]},
    ];

    function Party() {
      return (
        <section className="page party">
          <PageHead eyebrow="With love and thanks" title="Wedding Party" />
          {PARTY_GROUPS.map((g, i) => (
            <div key={i} className="party__group">
              <h3 className="party__group-title">{g.script}</h3>
              <div className="party__group-eyebrow">{g.eyebrow}</div>
              <ul className="party__list">
                {g.items.map((p, j) => (
                  <li key={j} className="party__item">
                    <span className="party__name">{p.name}</span>
                    <span className="party__role">{p.role}</span>
                  </li>
                ))}
              </ul>
            </div>
          ))}
        </section>
      );
    }

    /* ---------- REGISTRY ---------- */
    function Registry() {
      const [copied, setCopied] = useState(false);
      const handle = "ellis.house.fund@email.com";
      return (
        <section className="page registry">
          <PageHead eyebrow="With your love" title="Registry" />
          <p className="registry__intro">
            Your presence is the greatest gift of all.<br/>
            For those who have asked — we're saving for a home,<br/>
            and any contribution toward our house fund<br/>
            would mean the world.
          </p>

          <div className="registry__card">
            <div className="registry__eyebrow">For the Ellis</div>
            <div className="registry__script">House Fund</div>
            <p className="registry__body">
              We'd be so grateful for any gift sent via Zelle.
              No amount is too small — every bit helps build the first
              chapter of our story together.
            </p>

            <div className="registry__zelle">
              <div className="registry__zelle-label">Zelle</div>
              <div className="registry__zelle-handle">{handle}</div>
              <button className="btn" style={{ marginTop: 16 }}
                onClick={() => {
                  navigator.clipboard?.writeText(handle);
                  setCopied(true);
                  setTimeout(() => setCopied(false), 1800);
                }}>
                {copied ? "Copied" : "Copy Handle"}
              </button>
              <div className="registry__memo">Please add "House Fund" to the memo · Sent to Madeline Whitford</div>
            </div>
          </div>
        </section>
      );
    }

    /* ---------- FAQ ---------- */
    const FAQS = [
      { q: "What is the dress code?",
        a: "Black tie optional. We'd love to see you in long dresses or cocktail attire, and tuxedos or dark suits. The ceremony and reception are both indoors, but pack a wrap for the evening." },
      { q: "Will the ceremony and reception be in the same location?",
        a: "The ceremony will be held at Grace Episcopal Church (98 Wentworth St) at 4:30 PM. The reception immediately follows at the Cedar Room (701 East Bay St). Shuttles will be provided from the host hotel to both venues." },
      { q: "Is there parking at the venue?",
        a: "Yes — complimentary valet at the Cedar Room. The church has limited street parking, so we strongly recommend the shuttle from The Charleston Place." },
      { q: "Can I bring a plus-one?",
        a: "Due to limited space, we're only able to accommodate the guests named on your invitation. Thank you for understanding." },
      { q: "Are children welcome?",
        a: "We adore your little ones, but our wedding will be an adults-only celebration with the exception of our flower girl and ring bearer. Charleston has wonderful sitters we'd be happy to recommend." },
      { q: "When is the RSVP deadline?",
        a: "Please RSVP by December 1, 2026 — earlier if you can. You can RSVP through The Knot link on the RSVP page." },
      { q: "What kind of food will be served?",
        a: "A seated four-course Lowcountry dinner with vegetarian and gluten-free options. Please note any allergies on your RSVP." },
      { q: "Will there be an open bar?",
        a: "Yes — beer, wine, and a few signature cocktails throughout the night." },
      { q: "What time should we arrive?",
        a: "Please arrive 30 minutes before the ceremony. Doors close at 4:25 PM sharp so the procession can begin." },
      { q: "What's the weather like in September?",
        a: "Warm and humid — typically 70–85°F. There's a small chance of evening rain, so the venue has us covered either way." },
    ];

    function FAQ() {
      const [open, setOpen] = useState(0);
      const refs = useRef([]);
      return (
        <section className="page">
          <PageHead eyebrow="Everything you need" title="Questions" />
          <div className="faq">
            {FAQS.map((f, i) => (
              <div key={i} className={"faq__item" + (open === i ? " open" : "")}>
                <button className="faq__q" onClick={() => setOpen(open === i ? -1 : i)}>
                  <span>{f.q}</span>
                  <span className="chev" aria-hidden="true" />
                </button>
                <div className="faq__a"
                     ref={el => refs.current[i] = el}
                     style={{ maxHeight: open === i && refs.current[i] ? refs.current[i].scrollHeight + "px" : 0 }}>
                  <div className="faq__a-inner">{f.a}</div>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ---------- RSVP ---------- */
    function RSVP() {
      return (
        <section className="page rsvp">
          <PageHead eyebrow="The honor of your reply" title="RSVP" />

          <div className="rsvp__envelope">
            <div className="rsvp__envelope-body" />
            <div className="rsvp__seal">E</div>
          </div>

          <p className="rsvp__lead">
            We've made it easy — please RSVP through<br/>
            our wedding page on The Knot.<br/>
            Kindly reply by <strong style={{ fontStyle: "normal", color: "var(--crimson)" }}>December 1, 2026</strong>.
          </p>

          <a className="btn" href="https://www.theknot.com" target="_blank" rel="noreferrer">
            RSVP on The Knot
            <Icon.ext />
          </a>

          <div className="rsvp__date">Ivana &amp; Sirron · 03.14.2027</div>
        </section>
      );
    }

    /* ---------- Footer ---------- */
    function Footer() {
      return (
        <footer className="footer">
          <div className="footer__script">The Ellis Wedding</div>
          <div className="footer__date">March 14, 2027 · Jersey City, NJ</div>
        </footer>
      );
    }

    /* ---------- App ---------- */
    function App() {
      const [route, go] = useHashRoute();
      const [navOpen, setNavOpen] = useState(false);

      // close drawer on route change
      useEffect(() => { setNavOpen(false); }, [route]);

      const Page = {
        home: Home, playlist: Playlist, travel: Travel, things: Things,
        photos: Photos, party: Party, registry: Registry, faq: FAQ, rsvp: RSVP,
      }[route] || Home;

      const transparent = route === "home";

      return (
        <div className="app">
          <Header transparent={transparent} onMenu={() => setNavOpen(true)} onBrand={() => go("home")} />
          <main>
            <Page key={route} go={go} />
            {route !== "home" && <Footer />}
          </main>
          <Drawer open={navOpen} onClose={() => setNavOpen(false)} route={route} go={go} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
